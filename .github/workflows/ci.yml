name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust — fmt, clippy, test, doctest
    runs-on: windows-latest
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (zero warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Unit + integration tests
        run: cargo test --workspace --all-features

      - name: Doctests
        run: cargo test --workspace --doc

  proto:
    name: Protobuf — buf lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: protos
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.69.0"

      - name: buf lint
        run: buf lint

  go:
    name: Go — build, vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/causal-observer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.10"
          cache-dependency-path: services/causal-observer/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  python:
    name: Python — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - cache-oracle
          - experiment-engine
          - eval-fabric
          - synthgen
          - reliability-model
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --dev

      - name: Smoke import check
        run: |
          if [ -d src ]; then
            uv run python -c "print('${{ matrix.service }}: environment OK')"
          fi
